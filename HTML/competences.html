<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compétences - Portfolio POURNY J.</title>
    <link rel="stylesheet" href="../CSS/style_comp.css">
</head>
<body>
    
    <!-- Header -->

    <header>

        <a href="index.html"><h1>POURNY JOSH</h1></a>

        <!-- Boutons d'accès rapide -->

        <div id="header_nav">

            <!-- GitHub -->

            <a href="https://github.com/Skyro-source" class="header_link">
                <div class="header_button" id="git">
                    <img src="../Images/Logos/github_PNG40_noir.png" alt="logo_git" class="header_img">
                    <p class="header_txt">Github</p>
                </div>
            </a>

            <a href="CV.html" class="header_link">
                <div class="header_button" id="cv">

            </a>

                </div>

            <div class="nav_button" id="nav_active">
                <img src="../Images/Logos/outils-dedition_noir.png" alt="git" class="nav_img">

            </div>

            <a href="cv.html" class="nav_link">
                <div class="nav_button" onmouseover="changerLogo(this, 2)" onmouseout="restaurerLogo(this)">

            <a href="parcours.html" class="nav_link">
                <div class="nav_button" onmouseover="changerLogo(this, 3)" onmouseout="restaurerLogo(this)">
                    <img src="../Images/Logos/itineraire.png" alt="git" class="nav_img">

            <a href="certifications.html" class="nav_link">
                <div class="nav_button" onmouseover="changerLogo(this, 4)" onmouseout="restaurerLogo(this)">

                </div>
            </a>

            <a href="epreuve_e5.html" class="nav_link">

                    <img src="../Images/Logos/notepad.png" alt="git" class="nav_img">
                    <p class="nav_txt">Épreuve E5</p>
                </div>
            </a>

        </div>
    
        <div id="contents">

            <div id="title_div">

            <div id="elements">

                    <div class="comp_div">
                        <img class="comp_img" src="../Images/Logos/HTML.png">

                    </div>

                    <div class="comp_div">

                    <div class="comp_div">

                <div class="type_div">

                    <div class="comp_div">

                <div class="type_div">
